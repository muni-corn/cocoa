inputs:
  cocoa:
    # using `path:.` here SUCKS
    # we'll just use the github version instead
    url: github:muni-corn/cocoa
    inputs:
      nixpkgs:
        follows: nixpkgs
  crate2nix:
    url: github:nix-community/crate2nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  flake-parts:
    url: github:hercules-ci/flake-parts
    inputs:
      nixpkgs-lib:
        follows: nixpkgs
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  musicaloft-shell:
    url: github:musicaloft/musicaloft-shell
  nixpkgs:
    url: github:cachix/devenv-nixpkgs/rolling
  rust-overlay:
    url: github:oxalica/rust-overlay
    inputs:
      nixpkgs:
        follows: nixpkgs
  treefmt-nix:
    url: github:numtide/treefmt-nix
    inputs:
      nixpkgs:
        follows: nixpkgs

imports:
  - musicaloft-shell
