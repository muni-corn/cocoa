[commit]
types = [
  "build",
  "chore",
  "ci",
  "docs",
  "feat",
  "fix",
  "perf",
  "refactor",
  "revert",
  "style",
  "test",
]

[commit.rules]
enabled = true
ignore_fixup_commits = true
ignore_amend_commits = true
ignore_squash_commits = true
ignore_merge_commits = true
ignore_revert_commits = true

[commit.rules.warn]
subject_length = 50
body_length = 500
no_scope = true
no_body = false
no_type = true
no_breaking_change_footer = true
regex_patterns = []

[commit.rules.deny]
subject_length = 72
no_scope = false
no_body = false
no_type = true
no_breaking_change_footer = false
regex_patterns = []
